# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect repo → uses this file
services:
  - type: web
    name: slide
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8000"
      # Optional server default AI key (users can also BYOK in the UI)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
